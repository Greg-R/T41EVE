; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy41]
platform = https://github.com/platformio/platform-teensy.git
; platform = teensy
board = teensy41
framework = arduino
build_flags = -D USB_DUAL_SERIAL
			  -D EVE_SOFT_RESET
              -D EVE_CFA800480E3_050SX
			  -D TEENSY_OPT_SMALLEST_CODE
monitor_speed = 115200
monitor_port = /dev/ttyACM0
monitor_dtr = 1

board_build.f_cpu = 528000000L

lib_deps = 
	bblanchon/ArduinoJson@^7.4.2
	https://github.com/chipaudette/OpenAudio_ArduinoLibrary.git
	etherkit/Etherkit Si5351@^2.2.0
    https://github.com/brianlow/Rotary
    https://github.com/RudolphRiedel/EmbeddedVideoEngine.git